name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 */12 * * *" # twice a day
  workflow_dispatch: # lets you run it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      # Step 1: Use the Docker container action (ignores local Node version rules)
      - name: Generate snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: akashhh-codes
          outputs: |
            dist/snake.svg?color_snake=2DD4BF&color_dots=0D1117,1B2138,4C8DFF,8B6CFF,FFB454

      # Step 2: Push the generated asset using the updated v5 version
      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
